# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    uploads_directory: '%kernel.project_dir%/public/uploads'
    images_directory: '%kernel.project_dir%/public/uploads/images'
    # Chat (branche chat1)
    chat_audio_max_size_bytes: 5242880
    chat_audio_max_duration_seconds: 120
    chat_audio_allowed_mime_types: ['audio/webm', 'audio/mpeg', 'audio/ogg', 'audio/wav']
    chat_upload_dir: '%kernel.project_dir%/public/uploads/chat'
    chat_upload_public_prefix: '/uploads/chat'
    chat_upload_max_size_bytes: 10485760
    chat_upload_max_files_per_message: 5
    chat_upload_allowed_mime_types: ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'application/pdf']
    chat_auto_reply_admin_email: ''
    chat_auto_reply_cooldown_minutes: 5

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Command\SendMailCommand:
        arguments:
            $mailtrapApiToken: '%env(MAILTRAP_API_TOKEN)%'

    App\Controller\ForgotPasswordController:
        arguments:
            $appEnv: '%env(APP_ENV)%'

    App\Service\MailtrapEmailService:
        arguments:
            $mailtrapApiToken: '%env(MAILTRAP_API_TOKEN)%'

    App\Service\ActivityRecommendationService:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'

    App\Service\LibreTranslateService:
        arguments:
            $baseUrl: '%env(LIBRETRANSLATE_URL)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
